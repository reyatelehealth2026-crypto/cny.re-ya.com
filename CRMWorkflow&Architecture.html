<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE CRM Workflow & Architecture</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Google Fonts: Noto Sans Thai -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Noto Sans Thai', sans-serif; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #6366f1;
            width: 24px;
            height: 24px;
            -webkit-animation: spin 1s linear infinite; /* Safari */
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 pb-20">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-20 shadow-sm">
        <div class="max-w-4xl mx-auto px-4 py-4">
            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <div class="flex items-center gap-3">
                    <div class="bg-[#00B900] text-white p-2 rounded-lg">
                        <i data-lucide="message-square" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-slate-900 leading-tight">LINE CRM System</h1>
                        <p class="text-xs text-slate-500 font-medium">Workflow & Architecture Documentation</p>
                    </div>
                </div>
                
                <!-- View Mode Switcher -->
                <div class="flex bg-slate-100 p-1 rounded-lg self-start sm:self-auto">
                    <button onclick="switchMode('user')" id="btn-mode-user" class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all duration-200 bg-white text-[#00B900] shadow-sm">
                        <i data-lucide="user" class="w-4 h-4"></i>
                        <span>Customer</span>
                    </button>
                    <button onclick="switchMode('admin')" id="btn-mode-admin" class="flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all duration-200 text-slate-500 hover:text-slate-700">
                        <i data-lucide="shield-check" class="w-4 h-4"></i>
                        <span>Admin</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        
        <!-- Navigation Tabs -->
        <div class="mb-8 overflow-x-auto pb-2 scrollbar-hide -mx-4 px-4 sm:mx-0 sm:px-0">
            <div id="tabs-container" class="flex gap-2 min-w-max">
                <!-- Tabs will be injected here via JS -->
            </div>
        </div>

        <!-- Active Flow Content -->
        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden min-h-[500px] fade-in" id="flow-content-card">
            
            <!-- Flow Header -->
            <div id="flow-header-bg" class="p-6 sm:p-8 border-b border-slate-100 bg-green-50/30">
                <div class="flex items-start justify-between gap-4">
                    <div>
                        <h2 id="flow-title" class="text-2xl font-bold mb-2 flex items-center gap-2 text-slate-800">
                            <!-- Title injected via JS -->
                        </h2>
                        <p id="flow-desc" class="text-slate-600 leading-relaxed max-w-2xl">
                            <!-- Description injected via JS -->
                        </p>
                    </div>
                    
                    <!-- Gemini Button Desktop -->
                    <button onclick="openAiModal()" class="hidden sm:flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white rounded-full font-semibold shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200 text-sm whitespace-nowrap">
                        <i data-lucide="sparkles" class="w-4 h-4"></i>
                        <span>Gemini Insight</span>
                    </button>
                </div>
                <!-- Gemini Button Mobile -->
                <button onclick="openAiModal()" class="mt-4 sm:hidden w-full flex justify-center items-center gap-2 px-4 py-2 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white rounded-xl font-semibold shadow-sm text-sm">
                    <i data-lucide="sparkles" class="w-4 h-4"></i>
                    <span>วิเคราะห์ Flow ด้วย Gemini</span>
                </button>
            </div>

            <!-- Flow Steps (Vertical Timeline) -->
            <div class="p-6 sm:p-8 relative">
                <!-- Connecting Line -->
                <div class="absolute left-8 sm:left-12 top-10 bottom-10 w-0.5 bg-slate-200"></div>

                <!-- Steps Container -->
                <div id="steps-container" class="space-y-8">
                    <!-- Steps will be injected here via JS -->
                </div>

                <!-- End Node -->
                <div class="relative flex items-center mt-8">
                    <div class="relative z-10 w-4 h-4 rounded-full bg-slate-300 border-4 border-white ml-4 sm:ml-5"></div>
                    <span class="ml-8 sm:ml-12 text-xs font-medium text-slate-400 uppercase tracking-widest">End of Flow</span>
                </div>
            </div>
        </div>

        <!-- Legend -->
        <div id="legend-container" class="mt-8 flex flex-wrap gap-4 justify-center text-xs text-slate-500">
            <!-- Legend items injected via JS -->
        </div>

    </main>

    <!-- AI Modal -->
    <div id="ai-modal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[80vh] flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="ai-modal-content">
            
            <!-- Modal Header -->
            <div class="p-4 border-b flex items-center justify-between bg-gradient-to-r from-indigo-50 to-purple-50">
                <div class="flex items-center gap-2 text-indigo-700">
                    <i data-lucide="sparkles" class="w-5 h-5"></i>
                    <h3 class="font-bold">Gemini Analysis: <span id="ai-flow-title">...</span></h3>
                </div>
                <button onclick="closeAiModal()" class="p-1 hover:bg-white/50 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-slate-500"></i>
                </button>
            </div>

            <!-- Modal Body -->
            <div class="p-6 overflow-y-auto">
                <div id="ai-loading" class="flex flex-col items-center justify-center py-12 gap-4 text-slate-400 hidden">
                    <div class="spinner border-indigo-500"></div>
                    <p class="text-sm font-medium animate-pulse">Gemini กำลังวิเคราะห์ข้อมูล...</p>
                </div>
                <div id="ai-result" class="prose prose-sm prose-indigo max-w-none text-slate-700 hidden">
                    <!-- AI Content goes here -->
                </div>
            </div>
            
            <!-- Modal Footer -->
            <div class="p-4 border-t bg-slate-50 text-right">
                <button onclick="closeAiModal()" class="px-4 py-2 bg-white border border-slate-200 text-slate-600 rounded-lg text-sm font-medium hover:bg-slate-50 transition-colors">
                    ปิดหน้าต่าง
                </button>
            </div>
        </div>
    </div>

    <!-- Data & Logic Script -->

                icon: 'user-plus',
                steps: [
                    { type: 'user', title: 'User Add Friend', desc: 'ผู้ใช้กดเพิ่มเพื่อน LINE Official Account', icon: 'user-plus' },
                    { type: 'system', title: 'System Webhook Trigger', desc: 'LINE ส่ง Event "follow" มาที่ webhook.php', icon: 'server' },
                    { type: 'system', title: 'Create User & Auto Tag', desc: 'บันทึก User ลง Database พร้อมติด Tag และเริ่ม CRM Tracking', icon: 'database' },
                    { type: 'user', title: 'Receive Welcome Message', desc: 'ผู้ใช้ได้รับ Flex Message (เมนู AI Chat, Shop, นัดหมาย)', icon: 'message-square' }
                ]
            },
            {
                id: 'user_flow2',
                title: '2. สมัครสมาชิก (Registration)',
                description: 'การแปลง Follower ให้เป็น Member เต็มตัวผ่าน LIFF เพื่อเก็บข้อมูลเชิงลึก',
                icon: 'user',
                steps: [
                    { type: 'user', title: 'Click Registration Link', desc: 'ผู้ใช้กดเมนูสมัครสมาชิก', icon: 'smartphone' },
                    { type: 'system', title: 'LIFF Initialization', desc: 'เปิดหน้าเว็บ LIFF ดึง Profile (UID, Display Name) จาก LINE อัตโนมัติ', icon: 'server' },
                    { type: 'user', title: 'Fill Personal Data', desc: 'กรอกชื่อ-สกุล, วันเกิด, โรคประจำตัว, ยาที่แพ้', icon: 'user' },
                    { type: 'system', title: 'Save & Grant Points', desc: 'บันทึกข้อมูลสมาชิกและแจกแต้มต้อนรับ (Welcome Points)', icon: 'database' },
                    { type: 'user', title: 'Registration Success', desc: 'ได้รับบัตรสมาชิก Virtual Card และแจ้งเตือนแต้มที่ได้รับ', icon: 'check-circle' }

                    { type: 'user', title: 'Checkout & Address', desc: 'ตรวจสอบตะกร้า และกรอกที่อยู่จัดส่ง', icon: 'credit-card' },
                    { type: 'user', title: 'Payment', desc: 'เลือกชำระเงิน (โอนเงินแนบสลิป, PromptPay, หรือ COD)', icon: 'credit-card' },
                    { type: 'system', title: 'Create Order', desc: 'สร้าง Transaction ในระบบ สถานะ Pending', icon: 'database' },
                    { type: 'system', title: 'Order Tracking', desc: 'อัปเดตสถานะ: Paid -> Confirmed -> Shipping -> Delivered', icon: 'truck' }
                ]
            },
            {
                id: 'user_flow4',
                title: '4. ปรึกษา AI เภสัชกร (AI Pharmacy)',
                description: 'ระบบ AI ช่วยตอบคำถามสุขภาพเบื้องต้น พร้อมระบบ Safety Check',

                ]

            {

                icon: 'video',
                steps: [
                    { type: 'user', title: 'Book Appointment', desc: 'เปิด LIFF เลือกวัน/เวลา และกดยืนยันการนัดหมาย', icon: 'calendar' },
                    { type: 'system', title: 'Save Appointment', desc: 'บันทึกการนัดหมายลง Database', icon: 'database' },
                    { type: 'system', title: 'Cron Job Reminder', desc: 'ระบบตรวจสอบคิวทุก 15 นาที เพื่อส่งแจ้งเตือนก่อนเวลานัด (1 ชม. / 1 วัน)', icon: 'server' },
                    { type: 'user', title: 'Video Call Session', desc: 'เมื่อถึงเวลา กดลิงก์เพื่อเริ่ม Video Call กับเภสัชกร', icon: 'video' }
                ]
            }
        ];

        const ADMIN_FLOWS = [
            {
                id: 'admin_flow1',
                title: '1. เข้าสู่ระบบ (Admin Login)',
                description: 'ระบบ Authentication และการจัดการสิทธิ์การเข้าถึง (RBAC)',
                icon: 'shield-check',
                steps: [
                    { type: 'admin', title: 'Access /auth/login.php', desc: 'เข้าสู่หน้า Login และกรอก Username/Password', icon: 'shield-check' },
                    { type: 'system', title: 'Verify & Role Check', desc: 'ตรวจสอบสิทธิ์: Super Admin (ดูทุกบอท), Admin (บอทที่กำหนด), User (บอทตัวเอง)', icon: 'server' },
                    { type: 'admin', title: 'Admin Dashboard', desc: 'แสดงภาพรวม: สถิติผู้ใช้, ยอดขาย, ข้อความล่าสุด, และ Quick Actions', icon: 'layout-dashboard' }
                ]
            },
            {
                id: 'admin_flow2',
                title: '2. จัดการข้อความ (Chat Management)',
                description: 'ระบบหลังบ้านสำหรับตอบแชทลูกค้า ตรวจสอบสลิป และส่งไฟล์',
                icon: 'message-square',
                steps: [
                    { type: 'admin', title: 'Open Message Center', desc: 'เข้าเมนู messages.php ดูรายการลูกค้า (แยกตาม Unread badge)', icon: 'message-square' },
                    { type: 'admin', title: 'View Chat History', desc: 'ดูประวัติการสนทนา รูปภาพ และสลิปโอนเงิน', icon: 'smartphone' },
                    { type: 'system', title: 'Send Reply (Push Message)', desc: 'แอดมินพิมพ์ตอบกลับ -> ระบบเรียก LINE Messaging API ส่งข้อความหา User', icon: 'server' }
                ]
            },
            {
                id: 'admin_flow3',
                title: '3. จัดการออเดอร์ (Order Management)',
                description: 'Process การจัดการคำสั่งซื้อ ตั้งแต่ตรวจสอบสลิปจนถึงจัดส่ง',
                icon: 'clipboard-list',
                steps: [
                    { type: 'admin', title: 'View Order List', desc: 'ดูรายการออเดอร์ที่เข้ามา Filter: รอชำระ, รอตรวจสลิป, จัดส่งแล้ว', icon: 'clipboard-list' },
                    { type: 'admin', title: 'Verify Payment', desc: 'ตรวจสอบยอดเงินและสลิปโอนเงิน (สำหรับเคสโอนจ่าย)', icon: 'check-circle' },
                    { type: 'admin', title: 'Update Status & Ship', desc: 'เปลี่ยนสถานะเป็น "จัดส่งแล้ว" -> ระบบแจ้งเตือนลูกค้าทาง LINE อัตโนมัติ', icon: 'truck' }
                ]
            },
            {
                id: 'admin_flow4',
                title: '4. Broadcast ข้อความ',
                description: 'เครื่องมือการตลาด ส่งข้อความหกลุ่มเป้าหมายแบบเจาะจง (Segmentation)',
                icon: 'megaphone',
                steps: [
                    { type: 'admin', title: 'Select Broadcast Type', desc: 'เลือกรูปแบบ: ข้อความ, รูปภาพ, Flex Message, หรือ Catalog', icon: 'megaphone' },
                    { type: 'admin', title: 'Targeting (Segmentation)', desc: 'เลือกกลุ่มเป้าหมายจาก Tags (เช่น VIP) หรือพฤติกรรมการซื้อ', icon: 'users' },
                    { type: 'system', title: 'Schedule & Multicast', desc: 'ตั้งเวลาส่ง -> ระบบใช้ Multicast API ส่งข้อความตามเวลาที่กำหนด', icon: 'clock' }
                ]
            },
            {
                id: 'admin_flow5',
                title: '5. ตั้งค่า Auto Reply',
                description: 'กำหนดกฎการตอบกลับอัตโนมัติ เพื่อลดภาระแอดมิน',
                icon: 'zap',
                steps: [
                    { type: 'admin', title: 'Define Rules', desc: 'ตั้งค่า Keyword (เช่น "ราคา", "โปรโมชั่น") และ Match Type', icon: 'settings' },
                    { type: 'system', title: 'Priority Logic Check', desc: 'ระบบทำงานตามลำดับ: User State -> Keywords -> AI Mode -> Default', icon: 'cpu' }
                ]
            },
            {
                id: 'admin_flow6',
                title: '6. Background Jobs & Architecture',
                description: 'การทำงานเบื้องหลังของระบบ (Cron Jobs) และภาพรวม Data Flow',
                icon: 'activity',
                steps: [
                    { type: 'system', title: 'Sync Worker (Every 1 min)', desc: 'Sync สินค้าจาก ERP/API ภายนอก และประมวลผล Queue', icon: 'server' },
                    { type: 'system', title: 'Appointment Reminder (Every 15 mins)', desc: 'ตรวจนัดหมายที่ใกล้ถึง และส่งแจ้งเตือนหาลูกค้า', icon: 'clock' },
                    { type: 'system', title: 'Scheduled Sender', desc: 'ตรวจสอบและส่ง Broadcast หรือ Drip Campaign ตามเวลา', icon: 'megaphone' },
                    { type: 'system', title: 'System Integration Overview', desc: 'LINE Server <-> Webhook/LIFF <-> Database <-> Admin Dashboard/AI Module', icon: 'database' }
                ]
            }
        ];

        // --- 2. State Management ---
        let currentMode = 'user'; // 'user' | 'admin'
        let activeFlowId = USER_FLOWS[0].id;
        let aiResult = '';
        const API_KEY = "AIzaSyCoP6VeLIoHecmWJGvoaqbjWSOh7ft9Jg4"; // ใส่ API Key ตรงนี้ (ถ้าไม่มีจะใช้ Mock หรือ Error)

        // --- 3. DOM Elements ---
        const btnModeUser = document.getElementById('btn-mode-user');
        const btnModeAdmin = document.getElementById('btn-mode-admin');
        const tabsContainer = document.getElementById('tabs-container');
        const flowContentCard = document.getElementById('flow-content-card');
        const flowHeaderBg = document.getElementById('flow-header-bg');
        const flowTitle = document.getElementById('flow-title');
        const flowDesc = document.getElementById('flow-desc');
        const stepsContainer = document.getElementById('steps-container');
        const legendContainer = document.getElementById('legend-container');
        
        const aiModal = document.getElementById('ai-modal');
        const aiModalContent = document.getElementById('ai-modal-content');
        const aiFlowTitle = document.getElementById('ai-flow-title');
        const aiLoading = document.getElementById('ai-loading');
        const aiResultDiv = document.getElementById('ai-result');

        // --- 4. Logic Functions ---

        function init() {
            renderView();
            lucide.createIcons();
        }

        function switchMode(mode) {
            currentMode = mode;
            activeFlowId = (mode === 'user') ? USER_FLOWS[0].id : ADMIN_FLOWS[0].id;
            renderView();
        }

        function setActiveFlow(id) {
            activeFlowId = id;
            renderView();
        }

        function getCurrentFlows() {
            return currentMode === 'user' ? USER_FLOWS : ADMIN_FLOWS;
        }

        function getActiveFlow() {
            return getCurrentFlows().find(f => f.id === activeFlowId) || getCurrentFlows()[0];
        }

        function renderView() {
            // Update Mode Buttons
            if (currentMode === 'user') {
                btnModeUser.className = 'flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all duration-200 bg-white text-[#00B900] shadow-sm';
                btnModeUser.querySelector('span').classList.remove('text-slate-500');
                
                btnModeAdmin.className = 'flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all duration-200 text-slate-500 hover:text-slate-700';
                
                flowHeaderBg.className = 'p-6 sm:p-8 border-b border-slate-100 bg-green-50/30';
                flowTitle.innerHTML = `<span class="text-[#00B900]">#</span> ${getActiveFlow().title}`;
            } else {
                btnModeAdmin.className = 'flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all duration-200 bg-white text-blue-600 shadow-sm';
                
                btnModeUser.className = 'flex items-center gap-2 px-4 py-2 rounded-md text-sm font-semibold transition-all duration-200 text-slate-500 hover:text-slate-700';

                flowHeaderBg.className = 'p-6 sm:p-8 border-b border-slate-100 bg-blue-50/30';
                flowTitle.innerHTML = `<span class="text-blue-600">#</span> ${getActiveFlow().title}`;
            }

            // Render Tabs
            renderTabs();

            // Render Active Flow Content
            const flow = getActiveFlow();
            flowDesc.textContent = flow.description;
            
            // Render Steps
            stepsContainer.innerHTML = flow.steps.map(step => renderStepHtml(step)).join('');

            // Render Legend
            renderLegend();

            // Re-initialize icons
            setTimeout(() => lucide.createIcons(), 0);
        }

        function renderTabs() {
            const flows = getCurrentFlows();
            const activeColorClass = currentMode === 'user' 
                ? 'bg-[#00B900] text-white border-[#00B900] shadow-md shadow-green-100 transform scale-105' 
                : 'bg-blue-600 text-white border-blue-600 shadow-md shadow-blue-100 transform scale-105';
            
            const inactiveColorClass = 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50 hover:border-slate-300';

            tabsContainer.innerHTML = flows.map(flow => {
                const isActive = flow.id === activeFlowId;
                const flowName = flow.title.split('. ')[1].split(' (')[0];
                
                return `
                    <button onclick="setActiveFlow('${flow.id}')" 
                        class="flex items-center gap-2 px-4 py-3 rounded-xl text-sm font-semibold transition-all duration-200 border whitespace-nowrap ${isActive ? activeColorClass : inactiveColorClass}">
                        <i data-lucide="${flow.icon}" class="w-4 h-4"></i>
                        <span>${flowName}</span>
                    </button>
                `;
            }).join('');
        }

        function renderStepHtml(step) {
            const isUserAction = step.type === 'user';
            const isAdminAction = step.type === 'admin';
            const isEmergency = step.title.includes('Emergency');

            let iconBgClass, badgeClass, cardClass, badgeText;

            if (isUserAction) {
                iconBgClass = 'bg-gradient-to-br from-[#00B900] to-[#009000]';
                badgeClass = 'bg-green-100 text-green-700';
                cardClass = 'bg-green-50/50 border-green-100 hover:shadow-md hover:shadow-green-50';
                badgeText = 'Customer Action';
            } else if (isAdminAction) {
                iconBgClass = 'bg-gradient-to-br from-blue-500 to-blue-600';
                badgeClass = 'bg-blue-100 text-blue-700';
                cardClass = 'bg-blue-50/50 border-blue-100 hover:shadow-md hover:shadow-blue-50';
                badgeText = 'Admin Action';
            } else if (isEmergency) {
                iconBgClass = 'bg-gradient-to-br from-red-500 to-red-600';
                badgeClass = 'bg-red-100 text-red-700';
                cardClass = 'bg-red-50/50 border-red-100';
                badgeText = 'System Process';
            } else {
                iconBgClass = 'bg-slate-100 border-slate-50';
                badgeClass = 'bg-slate-100 text-slate-500';
                cardClass = 'bg-white border-slate-100 hover:shadow-md hover:border-slate-200';
                badgeText = 'System Process';
            }

            // Override text color for System icons to be grey instead of white default
            const iconColorClass = (isUserAction || isAdminAction || isEmergency) ? 'text-white' : 'text-gray-600';

            return `
                <div class="relative flex items-start group">
                    <!-- Icon Node -->
                    <div class="relative z-10 flex-shrink-0 w-12 h-12 sm:w-14 sm:h-14 rounded-2xl flex items-center justify-center shadow-sm border-4 border-white transition-transform duration-300 group-hover:scale-110 ${iconBgClass}">
                        <i data-lucide="${step.icon}" class="w-6 h-6 ${iconColorClass}"></i>
                    </div>

                    <!-- Content Card -->
                    <div class="ml-4 sm:ml-8 flex-1">
                        <div class="p-5 rounded-2xl border transition-all duration-200 ${cardClass}">
                            <div class="flex items-center gap-2 mb-1">
                                <span class="text-[10px] uppercase tracking-wider font-bold px-2 py-0.5 rounded-full ${badgeClass}">
                                    ${badgeText}
                                </span>
                            </div>
                            <h3 class="text-lg font-bold mb-1 text-slate-800">${step.title}</h3>
                            <p class="text-sm text-slate-600 leading-relaxed">${step.desc}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderLegend() {
            let html = '';
            
            if (currentMode === 'user') {
                html += `
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-[#00B900]"></div>
                        <span>User Action</span>
                    </div>
                `;
            }
            if (currentMode === 'admin') {
                html += `
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-blue-500"></div>
                        <span>Admin Action</span>
                    </div>
                `;
            }
            html += `
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 rounded-full bg-slate-300"></div>
                    <span>System Process</span>
                </div>
            `;
            if (currentMode === 'user') {
                html += `
                    <div class="flex items-center gap-2">
                        <div class="w-3 h-3 rounded-full bg-red-500"></div>
                        <span>Critical/Emergency</span>
                    </div>
                `;
            }

            legendContainer.innerHTML = html;
        }

        // --- 5. Gemini AI Logic ---
        
        function openAiModal() {
            const flow = getActiveFlow();
            aiFlowTitle.textContent = flow.title;
            
            // Reset state
            aiResultDiv.innerHTML = '';
            aiResultDiv.classList.add('hidden');
            aiLoading.classList.remove('hidden');
            
            // Show Modal
            aiModal.classList.remove('hidden');
            // Slight delay for animation
            setTimeout(() => {
                aiModal.classList.remove('opacity-0');
                aiModalContent.classList.remove('scale-95');
                aiModalContent.classList.add('scale-100');
            }, 10);

            // Fetch AI
            fetchGeminiInsight(flow);
        }

        function closeAiModal() {
            aiModal.classList.add('opacity-0');
            aiModalContent.classList.remove('scale-100');
            aiModalContent.classList.add('scale-95');
            
            setTimeout(() => {
                aiModal.classList.add('hidden');
            }, 300);
        }

        async function fetchGeminiInsight(flow) {
            // Check if we have API KEY
            if (!API_KEY) {
                // Mock Response for Demo
                setTimeout(() => {
                    const mockHtml = `
                        <h3>📝 บทสรุปสำหรับผู้บริหาร (Demo Mode)</h3>
                        <p>Flow "${flow.title}" เป็นส่วนสำคัญที่ช่วยลดภาระงานของพนักงานได้ 40% โดยการใช้ระบบอัตโนมัติ (Automation) เข้ามาช่วยจัดการขั้นตอนที่ซ้ำซ้อน</p>
                        <h3>⚠️ จุดที่ควรระวัง</h3>
                        <ul>
                            <li>การเชื่อมต่อ API ภายนอกอาจมีความล่าช้า ควรมีระบบ Queue</li>
                            <li>UX ในส่วนของการกรอกข้อมูลอาจยาวเกินไป ควรแบ่งเป็น Step</li>
                        </ul>
                        <h3>💡 ไอเดียต่อยอด</h3>
                        <ul>
                            <li>ใช้ AI ช่วยวิเคราะห์พฤติกรรมลูกค้าเพื่อนำเสนอสินค้าที่แม่นยำขึ้น</li>
                            <li>เพิ่มระบบแจ้งเตือนผ่าน SMS กรณีลูกค้าไม่อ่าน LINE</li>
                        </ul>
                        <p class="text-xs text-red-500 mt-4">*นี่คือข้อความจำลอง กรุณาใส่ API Key ในโค้ดเพื่อใช้งานจริง</p>
                    `;
                    renderAiResult(mockHtml);
                }, 1500);
                return;
            }

            const prompt = `
                ทำหน้าที่เป็น System Analyst ผู้เชี่ยวชาญ วิเคราะห์ Workflow ของระบบ CRM บน LINE:
                ชื่อ Flow: "${flow.title}"
                คำอธิบาย: "${flow.description}"
                ขั้นตอนการทำงาน:
                ${flow.steps.map((s, i) => `${i+1}. [${s.type}] ${s.title}: ${s.desc}`).join('\n')}

                กรุณาวิเคราะห์และตอบกลับเป็นภาษาไทย ในรูปแบบ HTML (ไม่เอา Markdown fence) ดังนี้:
                <h3>📝 บทสรุปสำหรับผู้บริหาร</h3>
                <p>สรุปสั้นๆ ว่า Flow นี้สำคัญอย่างไรและสร้าง value อะไร</p>
                <h3>⚠️ จุดที่ควรระวัง (Risks & Bottlenecks)</h3>
                <ul><li>วิเคราะห์ความเสี่ยงทางเทคนิคหรือ UX ที่อาจเกิดขึ้น 2-3 ข้อ</li></ul>
                <h3>💡 ไอเดียต่อยอด (Improvements)</h3>
                <ul><li>เสนอไอเดียใช้ AI หรือ Automation เพิ่มเติมใน Flow นี้ 2-3 ข้อ</li></ul>
            `;

            try {
                const response = await fetch(
                    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    }
                );
                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "ไม่สามารถวิเคราะห์ข้อมูลได้";
                renderAiResult(text);
            } catch (error) {
                renderAiResult(`<p class="text-red-500">Error: ${error.message}</p>`);
            }
        }

        function renderAiResult(html) {
            aiLoading.classList.add('hidden');
            aiResultDiv.innerHTML = html;
            aiResultDiv.classList.remove('hidden');
        }

        // --- Start App ---
        init();

    </script>
</body>
</html>
